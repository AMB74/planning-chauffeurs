name: Archive planning hebdomadaire

on:
  schedule:
    # 08h00 UTC = 10h00 heure de Paris (CEST, heure d'ete)
    # Entre le 15 mai et le 15 novembre, la France est presque tout le temps
    # a l'heure d'ete (CEST = UTC+2), sauf la derniere quinzaine de novembre
    # deja hors periode active. Un ecart eventuel de 1h en toute fin de
    # periode est sans consequence sur le script (il filtre par date, pas heure).
    - cron: '0 8 * * 5'
  workflow_dispatch: {}

jobs:
  archive:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests google-api-python-client google-auth

      - name: Run archive script
        env:
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
          AIRTABLE_BASE: ${{ secrets.AIRTABLE_BASE }}
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
        run: python archive_planning.py
